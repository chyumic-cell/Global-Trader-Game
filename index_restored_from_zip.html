function content(){return state.screen==="main"?mainScreen():state.screen==="market"?marketScreen():state.screen==="logistics"?shippingScreen():state.screen==="storage"?storageScreen():intelScreen()}
function header(){return `<div class=shell><div class=grid2><button class="btn ${state.screen==='main'?'active':''}" onclick="showScreen('main')">Main Screen</button><button class="btn primary" onclick="nextTurn()">End Turn</button></div><div class=grid4 style="margin-top:10px"><div class=stat><div class=l>City</div><div class=v>${state.currentCity}</div></div><div class=stat><div class=l>Cash</div><div class=v>$${state.money.toLocaleString()}</div></div><div class=stat><div class=l>Cargo</div><div class=v>${cargoCount()}</div></div><div class=stat><div class=l>Heat</div><div class=v>${heat()}</div></div></div></div>`}
function bottom(){return `<div class=shell><div class=grid4><button class="btn ${state.screen==='market'?'active':''}" onclick="showScreen('market')">Market</button><button class="btn ${state.screen==='logistics'?'active':''}" onclick="showScreen('logistics')">Shipping</button><button class="btn ${state.screen==='storage'?'active':''}" onclick="showScreen('storage')">Storage</button><button class="btn ${state.screen==='intel'?'active':''}" onclick="showScreen('intel')">Intel</button></div></div>`}
function render(){document.getElementById('top').innerHTML=header();document.getElementById('app').innerHTML=incidentHtml()+content()+`<div class=panel><div class=title>Status</div><div class=status>${state.message}</div></div>`;document.getElementById('bottom').innerHTML=bottom()}
function safeRender(){try{render()}catch(e){document.getElementById('app').innerHTML=`<div class=panel><div class=title>Game Error</div><div class=status><div class=subtle>Something broke while rendering the game.</div><pre>${String(e&&e.stack||e)}</pre></div></div>`}}
function showScreen(s){state.screen=s;safeRender()} function field(k,v){state[k]=v;safeRender()} function setCat(v){state.marketCat=v;state.marketItem=goods[v][0];safeRender()} function pickItem(v){state.marketItem=v;safeRender()} function pickDest(v){state.shipDest=v;const opts=routeModes(state.currentCity,v);if(!opts.some(([n])=>n===state.shipMode))state.shipMode=opts[0]?opts[0][0]:"Plane";safeRender()} function pickTravel(v){state.travelCity=v;safeRender()} function zoom(d){state.zoom=clamp(Number((state.zoom+d).toFixed(2)),.7,2.2);safeRender()} function resetZoom(){state.zoom=1;safeRender()}
window.showScreen=showScreen;window.nextTurn=nextTurn;window.field=field;window.setCat=setCat;window.pickItem=pickItem;window.pickDest=pickDest;window.pickTravel=pickTravel;window.buy=buy;window.sell=sell;window.addDraft=addDraft;window.tweakDraft=tweakDraft;window.removeDraft=removeDraft;window.toggleSec=toggleSec;window.dispatch=dispatch;window.travel=travel;window.buyPassport=buyPassport;window.piracy=piracy;window.theft=theft;window.shortage=shortage;window.prepay=prepay;window.resolve=resolve;window.zoom=zoom;window.resetZoom=resetZoom;
safeRender();
</script>
</body>
</html>
