const hash=s=>[...s].reduce((a,c)=>a+c.charCodeAt(0),0);

const profile=city=>{const cont=cityCont[city],h=hash(city);const lawBase={"North America":.82,Europe:.85,Africa:.5,"South America":.55,Asia:.7}[cont];const corBase={"North America":.15,Europe:.12,Africa:.45,"South America":.38,Asia:.28}[cont];return{continent:cont,law:clamp(lawBase+((h%17)-8)/100,.35,.98),corruption:clamp(corBase+((h%13)-6)/100,.03,.7),piracy:clamp((ports.has(city)?.03:.01)+((h%7)/100),.01,.18),airport:clamp(.02+((h%5)/100),.02,.08),safe:safeHavens.has(city),strict:strict.has(city),ship:ports.has(city),train:rail.has(city),truck:true}};
function baseBias(city,item){const a=(hash(city+item)%23)-11;return 1+a/50}
function contrabandBias(city,item){
  if(!illegal.has(item))return 1;
  const source={Bogota:{Drugs:.45,Weapons:.68,"Counterfeit Goods":.62},"Mexico City":{Drugs:.58,Weapons:.8,"Counterfeit Goods":.72},Manila:{Drugs:.64,Weapons:.82,"Counterfeit Goods":.7},Bangkok:{Drugs:.66,Weapons:.86,"Counterfeit Goods":.74},Jakarta:{Drugs:.7,Weapons:.9,"Counterfeit Goods":.78},Lagos:{Drugs:.72,Weapons:.84,"Counterfeit Goods":.8}};
  const demand={"New York":{Drugs:1.75,Weapons:1.45,"Counterfeit Goods":1.35},London:{Drugs:1.62,Weapons:1.48,"Counterfeit Goods":1.32},Berlin:{Drugs:1.78,Weapons:1.42,"Counterfeit Goods":1.36},Singapore:{Drugs:1.9,Weapons:1.52,"Counterfeit Goods":1.4},Tokyo:{Drugs:1.7,Weapons:1.38,"Counterfeit Goods":1.33},Dubai:{Drugs:1.58,Weapons:1.55,"Counterfeit Goods":1.28},Cairo:{Drugs:1.52,Weapons:1.46,"Counterfeit Goods":1.24},Johannesburg:{Drugs:1.48,Weapons:1.34,"Counterfeit Goods":1.22},Lagos:{Drugs:1.14,Weapons:1.08,"Counterfeit Goods":1.2},Manila:{Drugs:1.22,Weapons:1.14,"Counterfeit Goods":1.24}};
  return (source[city]&&source[city][item])||(demand[city]&&demand[city][item])||1;
}
function blankCityStorage(){return Object.fromEntries(allCities.map(c=>[c,{}]))}
function blankMap(){return Object.fromEntries(allCities.map(c=>[c,false]))}
function blankManip(){return Object.fromEntries(allCities.map(c=>[c,{}]))}
function buildMarket(manip={},prev){const m={};allCities.forEach(city=>{m[city]={};allItems.forEach(item=>{let t=base[item]*baseBias(city,item)*contrabandBias(city,item);if(manip[city]&&manip[city][item])t*=manip[city][item];if(prev&&prev[city]&&prev[city][item])t=prev[city][item]+(t-prev[city][item])*.22;const n=t*(.94+Math.random()*.12);m[city][item]=Math.max(1,Math.round(n))})});return m}
const init=buildMarket();
const state={screen:"main",turn:1,currentCity:"New York",travelCity:"Chicago",operationCity:"New York",shipOrigin:"New York",shipDest:"Chicago",shipMode:"Truck",money:50000,cargo:{},storage:blankCityStorage(),storagePlan:blankMap(),market:init,history:[copy(init)],marketNews:[],message:"Welcome trader. Buy low, ship smart, and keep your head down.",marketCat:"Industrial",marketItem:"Oil",tradeAmount:"1",shipItem:"Oil",shipAmount:"1",draft:[],security:{insurance:false,guards:false,bribe:false,stealth:false},shipments:[],incidents:[],notoriety:0,illegalSales:0,legalSales:0,enterpriseValue:250000,reputation:40,corporateHeat:10,whiteCollarProfit:0,investigations:0,warrant:{active:false,reason:""},passport:false,passportQuality:0,detained:0,releaseFine:0,manip:blankManip(),zoom:1,intelMode:"city",intelItem:"Oil",intelCity:"New York",agents:[],nextAgentId:1,hireType:"worker",agentTarget:"Chicago",autoSummary:""};
const prices=city=>state.market[city]||{};
const tradeCity=()=>state.operationCity;
const tradePrices=()=>prices(tradeCity());
const localStore=city=>state.storage[city||state.currentCity]||{};
const active=()=>state.incidents[0]||null;
const cargoCount=()=>Object.values(state.cargo).reduce((a,b)=>a+b,0);
const storageCount=city=>Object.values(localStore(city)).reduce((a,b)=>a+b,0);
const accessibleCities=()=>[...new Set([state.currentCity,...state.agents.map(a=>a.city)])];
const workerCount=()=>state.agents.filter(a=>a.type==="worker").length;
const thugCount=()=>state.agents.filter(a=>a.type==="thug").length;
const kingpin=()=>state.illegalSales>=100000||(thugCount()>=3&&(state.illegalSales>=50000||state.notoriety>=35||state.warrant.active));
const mogul=()=>state.legalSales>=1500000||state.enterpriseValue>=10000000||(workerCount()>=5&&(state.legalSales>=125000||state.enterpriseValue>=800000));
const hybrid=()=>state.whiteCollarProfit>=200000||(state.legalSales>=200000&&state.illegalSales>=75000&&workerCount()>=2&&thugCount()>=1);
const lifeType=()=>hybrid()&&kingpin()&&mogul()?"Shadow Tycoon":kingpin()?"Cartel Boss":mogul()?"Legal Mogul":"Independent Trader";
const inHaven=city=>profile(city||state.currentCity).safe;
const heat=()=>kingpin()&&state.warrant.active?"Kingpin Hunt":state.warrant.active?"Warrant":state.notoriety<20?"Unknown":state.notoriety<45?"Suspicious":state.notoriety<75?"Wanted":"Infamous";
const corpLabel=()=>state.corporateHeat<20?"Low":state.corporateHeat<45?"Building":state.corporateHeat<70?"Hostile":"Meltdown";

const bestBuy=item=>allCities.reduce((b,c)=>state.market[c][item]<state.market[b][item]?c:b,allCities[0]);
const bestSell=item=>allCities.reduce((b,c)=>state.market[c][item]>state.market[b][item]?c:b,allCities[0]);
const agentsAt=(city,type)=>state.agents.filter(agent=>agent.city===city&&(!type||agent.type===type));

const thugLegalSkim=agent=>clamp(.22+(1-agent.loyalty)*.33,.22,.55);
const availableThug=(city,task,turns)=>{const thug=availableAgentsAt(city,"thug").sort((a,b)=>b.loyalty-a.loyalty)[0];if(!thug)return null;if(task){thug.busy=turns;thug.task=task}return thug};
function shiftCorp(rep=0,heat=0,invest=0){state.reputation=clamp(Math.round(state.reputation+rep),0,100);state.corporateHeat=clamp(Math.round(state.corporateHeat+heat),0,100);state.investigations=clamp(Math.round(state.investigations+invest),0,100)}
function expandEnterprise(){if(state.detained>0)return setMsg("You are detained and cannot expand the company.");if(workerCount()<2)return setMsg("You need at least 2 workers to build a real legal empire.");const cost=Math.round(6000+workerCount()*900+state.enterpriseValue*.002);if(state.money<cost)return setMsg("Not enough money to fund an expansion push.");const gain=Math.round(cost*(3+workerCount()*.25)+state.reputation*600);state.money-=cost;state.enterpriseValue+=gain;state.legalSales+=Math.round(gain*.12);shiftCorp(2,6+workerCount(),0);setMsg(`You opened a bigger legal operation and added $${gain.toLocaleString()} in enterprise value.`)}
function charityGala(){const cost=Math.round(3500+state.enterpriseValue*.0012);if(state.money<cost)return setMsg("Not enough cash for a serious PR and charity push.");state.money-=cost;state.enterpriseValue+=Math.round(cost*.9+state.reputation*250);shiftCorp(8,-8,-4);setMsg(`A charity and PR blitz cost $${cost.toLocaleString()}, but the public image boost helped your empire.`)}
function cookBooks(){if(state.detained>0)return setMsg("You are detained and cannot move white-collar money around.");if(!mogul()&&workerCount()<2)return setMsg("You need a bigger legal machine before you can cook the books.");const gain=Math.round(12000+state.enterpriseValue*.015+state.legalSales*.01);state.money+=gain;state.whiteCollarProfit+=gain;state.enterpriseValue+=Math.round(gain*.6);shiftCorp(-4,12,14);if(Math.random()<clamp(.12+state.investigations/120+state.corporateHeat/180,.08,.55))setWarrant("Financial fraud and shell-company activity drew criminal attention.");setMsg(`You cooked the books and pulled $${gain.toLocaleString()} out of the shadows.`)}
function corporateIncident(){const city=state.currentCity,pool=[{type:"antitrust",title:`Antitrust hearing in ${city}`,description:"Regulators think your legal machine is squeezing competitors out of the market.",options:["lobbyBoard","acceptLoss"]},{type:"labor",title:`Fulfillment walkout in ${city}`,description:"Workers are slowing your empire and the press is circling.",options:["publicSpin","acceptLoss"]},{type:"pr",title:`PR firestorm in ${city}`,description:"Customers and journalists are piling onto your brand after a public backlash.",options:["publicSpin","acceptLoss"]}];if(hybrid()||state.whiteCollarProfit>0||state.investigations>25)pool.unshift({type:"sec",title:`SEC subpoena in ${city}`,description:"Auditors want your books, shell companies, and investor calls. This is hybrid-player heat.",options:["buryBooks","acceptLoss"]});return copy(pick(pool))}
function empireCard(showButtons){return `<div class=section><div class=section-title>Empire</div><div class=item><div class=row><div class=name>${lifeType()}</div><div class=badge>${corpLabel()}</div></div><div class=txt>Legal sales: $${state.legalSales.toLocaleString()}<br>Enterprise value: $${state.enterpriseValue.toLocaleString()}<br>Reputation: ${state.reputation}<br>Corporate heat: ${state.corporateHeat}<br>White-collar take: $${state.whiteCollarProfit.toLocaleString()}<br>Investigations: ${state.investigations}</div></div>${showButtons?`<div class=grid3 style="margin-top:10px"><button class=btn onclick="expandEnterprise()">Expand</button><button class=btn onclick="charityGala()">PR / Charity</button><button class=btn onclick="cookBooks()">Cook Books</button></div><div class=item style="margin-top:10px"><div class=txt style="margin-top:0">Legal mogul play grows workers, reputation, and enterprise value. Cartel play thrives on havens and contraband. Hybrid play mixes scale with shell games, subpoenas, and dirty finance.</div></div>`:""}</div>`}
const operatorFor=(city,item)=>{if(city===state.currentCity)return{kind:"self",skim:0,label:"you"};const workers=availableAgentsAt(city,"worker").sort((a,b)=>b.loyalty-a.loyalty),thugs=availableAgentsAt(city,"thug").sort((a,b)=>b.loyalty-a.loyalty);if(illegal.has(item)){if(!thugs.length)return null;return{kind:"thug",skim:thugSkim(thugs[0]),label:"thug",agent:thugs[0]}}if(workers.length)return{kind:"worker",skim:0,label:"worker",agent:workers[0]};if(thugs.length)return{kind:"thugLegal",skim:thugLegalSkim(thugs[0]),label:"thug",agent:thugs[0],badLegal:true};return null};
const currentTravelCost=()=>state.travelCity&&state.travelCity!==state.currentCity?Math.round((cityCont[state.currentCity]===cityCont[state.travelCity]?180:480)+Math.hypot(pos[state.travelCity].x-pos[state.currentCity].x,pos[state.travelCity].y-pos[state.currentCity].y)*10):0;
function shipInventory(city){const inv={...localStore(city)};if(city===state.currentCity)Object.entries(state.cargo).forEach(([item,qty])=>inv[item]=(inv[item]||0)+qty);return inv}

s=txt>Estimated reward: $${pir.min.toLocaleString()} to $${pir.max.toLocaleString()}<br>Current risk near ${state.currentCity}: ${pir.risk}%</div></div><div class=item><div class=name>Theft</div><div class=txt>Selected amount: ${th.qty}<br>Current risk: ${th.risk}%<br>Possible fine if caught: $${th.fine.toLocaleString()}</div></div><div class=item><div class=name>Shortage Scheme</div><div class=txt>Upfront cost: $${sh.cost.toLocaleString()}<br>Current risk: ${sh.risk}%<br>This pushes the selected good upward in the current city for a few turns.</div></div></div></div>`}
function shippingScreen(){const originChoices=accessibleCities().filter(city=>Object.values(shipInventory(city)).reduce((a,b)=>a+b,0)>0),origins=originChoices.length?originChoices:accessibleCities(),items=availableShipItems(),modes=routeModes(state.shipOrigin,state.shipDest),mode=(modes.find(([n])=>n===state.shipMode)||modes[0]||["Plane"])[0],cost=state.draft.length?shipCost(state.draft,mode,state.shipOrigin,state.shipDest,state.security):0,risk=Math.round(shipRisk(state.draft.length?state.draft:[{item:items[0]||state.shipItem||"Oil",qty:1}],mode,state.shipDest,state.security)*100);return `<div class=panel><div class=title>Shipping</div><div class=section><div class=section-title>Build Shipment</div><div class=field><label>Origin</label><select onchange="pickOrigin(this.value)">${origins.map(c=>`<option value="${c}"${state.shipOrigin===c?" selected":""}>${c}</option>`).join("")}</select></div><div class=field><label>Destination</label><select onchange="pickDest(this.value)">${allCities.filter(c=>c!==state.shipOrigin).map(c=>`<option value="${c}"${state.shipDest===c?" selected":""}>${c}</option>`).join("")}</select></div><div class=field><label>Transport</label><select onchange="field('shipMode',this.value)">${modes.map(([n])=>`<option value="${n}"${mode===n?" selected":""}>${n}</option>`).join("")}</select></div><div class=item><div class=txt style="margin-top:0">Time: ${transport[mode].time} turn${transport[mode].time>1?"s":""}<br>Capacity: ${transport[mode].cap}<br>Route cost preview: $${cost.toLocaleString()}<br>Route risk: ${risk}%</div></div></div><div class=section><div class=section-title>Cargo at ${state.shipOrigin}</div>${items.length?`<div class=field><label>Item</label><select onchange="field('shipItem',this.value)">${items.map(i=>`<option value="${i}"${state.shipItem===i?" selected":""}>${i} (${shipInventory(state.shipOrigin)[i]})</option>`).join("")}</select></div><div class=field><label>Amount</label><input value="${state.shipAmount}" onchange="field('shipAmount',this.value)"></div><button class=btn style="width:100%" onclick="addDraft()">Add to Shipment</button>`:`<div class=item><div class=subtle>No shippable cargo is sitting in ${state.shipOrigin} right now.</div></div>`}<div style="margin-top:10px">${state.draft.length?state.draft.map(l=>`<div class=item><div class=row><div class=name>${l.item}</div><div class=badge>${l.qty}</div></div><div style="display:flex;gap:8px;margin-top:10px"><button class="btn small" onclick='tweakDraft(${JSON.stringify(l.item)},-1)'>-</button><button class="btn small" onclick='tweakDraft(${JSON.stringify(l.item)},1)'>+</button><button class="btn small" style="margin-left:auto" onclick='removeDraft(${JSON.stringify(l.item)})'>Remove</button></div></div>`).join(""):'<div class=item><div class=subtle>No cargo assigned yet.</div></div>'}</div><div class=grid2 style="margin-top:10px">${Object.keys(sec).map(k=>`<button class="btn ${state.security[k]?"active":""}" onclick="toggleSec('${k}')">${sec[k].label}<br><span style="font-size:12px;opacity:.85">$${sec[k].cost}</span></button>`).join("")}</div><button class="btn primary" style="width:100%;margin-top:10px" onclick="dispatch()">Dispatch Shipment</button></div><div class=section><div class=section-title>In Transit</div>${activeRoutes()}</div></div>`}
function storageScreen(){const cities=allCities.filter(c=>Object.values(state.storage[c]).reduce((a,b)=>a+b,0)>0);return `<div class=panel><div class=title>Storage</div><div class=section><div class=section-title>Current City Storage</div><div class=item><div class=row><div class=name>${state.currentCity}</div><div class=badge>${storageCount()}</div></div><div class=txt>Prepaid storage: ${state.storagePlan[state.currentCity]?"Yes":"No"}</div></div><div style="margin-top:10px">${cargoHtml(localStore(),"Nothing waiting in local storage.")}</div><button class=btn style="width:100%;margin-top:10px" onclick="prepay()">Prepay Storage in ${state.currentCity} ($300)</button></div><div class=section><div class=section-title>Cargo Around the World</div>${cities.length?cities.map(c=>`<div class=item><div class=row><div class=name>${c}</div><div class=badge>${Object.values(state.storage[c]).reduce((a,b)=>a+b,0)}</div></div><div class=txt>Prepaid: ${state.storagePlan[c]?"Yes":"No"}</div><div style="margin-top:8px">${cargoHtml(state.storage[c],"Nothing here.")}</div></div>`).join(""):'<div class=item><div class=subtle>No goods are sitting in storage anywhere.</div></div>'}</div></div>`}
function intelScreen(){return `<div class=panel><div class=title>Intel</div><div class=section><div class=grid2><button class="btn ${state.intelMode==='city'?'active':''}" onclick="field('intelMode','city')">City View</button><button class="btn ${state.intelMode==='good'?'active':''}" onclick="field('intelMode','good')">Good View</button></div>${state.intelMode==='city'?`<div class=field style="margin-top:10px"><label>City</label><select onchange="field('intelCity',this.value)">${allCities.map(c=>`<option value="${c}"${state.intelCity===c?" selected":""}>${c}</option>`).join("")}</select></div><div class=item><div class=name>${state.intelCity}</div><div class=txt>All goods in this city right now.</div></div>`:`<div class=field style="margin-top:10px"><label>Good</label><select onchange="field('intelItem',this.value)">${allItems.map(i=>`<option value="${i}"${state.intelItem===i?" selected":""}>${i}</option>`).join("")}</select></div><div class=item><div class=name>${state.intelItem}</div><div class=txt>All cities ranked by this good.</div></div><div class=item><div class=name>Best Buy</div><div class=txt>${bestBuy(state.intelItem)} at $${state.market[bestBuy(state.intelItem)][state.intelItem].toLocaleString()}</div></div><div class=item><div class=name>Best Sale</div><div class=txt>${bestSell(state.intelItem)} at $${state.market[bestSell(state.intelItem)][state.intelItem].toLocaleString()}</div></div><div class=item><div class=name>World Average</div><div class=txt>$${avgPrice(state.intelItem).toLocaleString()}</div></div>`}</div><div class=section><div class=section-title>${state.intelMode==='city'?'All Goods in City':'All Cities for Good'}</div><div class=prices>${state.intelMode==='city'?allItems.map(i=>`<div class=cell><span>${i}</span><span>$${state.market[state.intelCity][i].toLocaleString()}</span></div>`).join(""):[...allCities].sort((a,b)=>state.market[b][state.intelItem]-state.market[a][state.intelItem]).map(c=>`<div class=cell><span>${c}</span><span>$${state.market[c][state.intelItem].toLocaleString()}</span></div>`).join("")}</div></div><div class=section><div class=section-title>Market News</div>${state.marketNews.length?state.marketNews.map(n=>`<div class=item><div class=txt style="margin-top:0">${n}</div></div>`).join(""):'<div class=item><div class=subtle>No major market shocks yet.</div></div>'}</div></div>`}
function incidentHtml(){const inc=active();if(!inc)return"";const cargo=inc.shipment&&inc.shipment.loads&&inc.shipment.loads.length?inc.shipment.loads.map(l=>`${l.item} x ${l.qty}`).join(", "):"Operational problem";return `<div class="panel incident"><div class=title>Active Problem: ${inc.title}</div><div class=txt style="margin-top:0">${inc.description}</div><div class=txt>Cargo: ${cargo}</div><div class=grid2 style="margin-top:10px">${inc.options.map(k=>`<button class="btn ${k==='acceptLoss'?'':'primary'}" onclick="resolve('${k}')">${allActions[k]}</button>`).join("")}</div></div>`}
function content(){if(state.screen==="main")return mainScreen()+empireCard(false);if(state.screen==="market")return marketScreen()+empireCard(true);return state.screen==="logistics"?shippingScreen():state.screen==="storage"?storageScreen():intelScreen()}
function header(){return `<div class=shell><div class=grid2><button class="btn ${state.screen==='main'?'active':''}" onclick="showScreen('main')">Main Screen</button><button class="btn primary" onclick="nextTurn()">End Turn</button></div><div class=grid4 style="margin-top:10px"><div class=stat><div class=l>City</div><div class=v>${state.currentCity}</div></div><div class=stat><div class=l>Cash</div><div class=v>$${state.money.toLocaleString()}</div></div><div class=stat><div class=l>Dirty</div><div class=v>$${state.illegalSales.toLocaleString()}</div></div><div class=stat><div class=l>Heat</div><div class=v>${heat()}</div></div></div><div class=chips style="margin-top:8px"><div class=chip>Life: ${lifeType()}</div><div class=chip>Operate: ${state.operationCity}</div><div class=chip>Agents: ${state.agents.length}</div><div class=chip>Legal: $${state.legalSales.toLocaleString()}</div><div class=chip>Enterprise: ${corpLabel()}</div>${kingpin()?`<div class=chip>Kingpin</div>`:""}${mogul()?`<div class=chip>Mogul</div>`:""}${hybrid()?`<div class=chip>Hybrid</div>`:""}${inHaven()?`<div class=chip>In Haven</div>`:""}${state.warrant.active?`<div class=chip>Warrant Active</div>`:""}${state.detained?`<div class=chip>Detained ${state.detained}</div>`:""}</div></div>`}
function bottom(){return `<div class=shell><div class=grid4><button class="btn ${state.screen==='market'?'active':''}" onclick="showScreen('market')">Market</button><button class="btn ${state.screen==='logistics'?'active':''}" onclick="showScreen('logistics')">Shipping</button><button class="btn ${state.screen==='storage'?'active':''}" onclick="showScreen('storage')">Storage</button><button class="btn ${state.screen==='intel'?'active':''}" onclick="showScreen('intel')">Intel</button></div></div>`}
function render(){document.getElementById('top').innerHTML=header();document.getElementById('app').innerHTML=incidentHtml()+content()+`<div class=panel><div class=title>Status</div><div class=status>${state.message}</div></div>`;document.getElementById('bottom').innerHTML=bottom()}
function safeRender(){try{render()}catch(e){document.getElementById('app').innerHTML=`<div class=panel><div class=title>Game Error</div><div class=status><div class=subtle>Something broke while rendering the game.</div><pre>${String(e&&e.stack||e)}</pre></div></div>`}}
function showScreen(s){state.screen=s;safeRender()}
function field(k,v){state[k]=v;if(k==="operationCity")ensureOperationCity();if(k==="shipOrigin"||k==="shipItem"||k==="shipDest")ensureShipOrigin();safeRender()}
function setCat(v){state.marketCat=v;state.marketItem=goods[v][0];safeRender()}
function pickItem(v){state.marketItem=v;safeRender()}
function pickOrigin(v){state.shipOrigin=v;if(state.shipDest===v)state.shipDest=allCities.find(c=>c!==v)||state.shipDest;const opts=routeModes(state.shipOrigin,state.shipDest);if(!opts.some(([n])=>n===state.shipMode))state.shipMode=opts[0]?opts[0][0]:"Plane";ensureShipOrigin();safeRender()}
function pickDest(v){state.shipDest=v;const opts=routeModes(state.shipOrigin,v);if(!opts.some(([n])=>n===state.shipMode))state.shipMode=opts[0]?opts[0][0]:"Plane";safeRender()}
function pickTravel(v){state.travelCity=v;safeRender()}
function zoom(d){state.zoom=clamp(Number((state.zoom+d).toFixed(2)),.7,2.2);safeRender()}
function resetZoom(){state.zoom=1;safeRender()}
window.showScreen=showScreen;window.nextTurn=nextTurn;window.field=field;window.setCat=setCat;window.pickItem=pickItem;window.pickOrigin=pickOrigin;window.pickDest=pickDest;window.pickTravel=pickTravel;window.buy=buy;window.sell=sell;window.hireAgent=hireAgent;window.moveAgent=moveAgent;window.addDraft=addDraft;window.tweakDraft=tweakDraft;window.removeDraft=removeDraft;window.toggleSec=toggleSec;window.dispatch=dispatch;window.travel=travel;window.buyPassport=buyPassport;window.piracy=piracy;window.theft=theft;window.shortage=shortage;window.prepay=prepay;window.resolve=resolve;window.zoom=zoom;window.resetZoom=resetZoom;window.expandEnterprise=expandEnterprise;window.charityGala=charityGala;window.cookBooks=cookBooks;
safeRender();
</script>
</body>
</html>
